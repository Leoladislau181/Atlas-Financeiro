<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Atlas" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <title>Atlas Financeiro</title>
  </head>
  <body>
    <!-- DEBUG ERROR CATCHER -->
    <div id="debug-error-box" style="display: none; position: fixed; top: 0; left: 0; right: 0; background: red; color: white; padding: 20px; z-index: 999999; font-family: monospace; white-space: pre-wrap; max-height: 50vh; overflow-y: auto;"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var box = document.getElementById('debug-error-box');
        box.style.display = 'block';
        box.innerHTML += 'Error: ' + message + '\\n\\n';
        if (error && error.stack) box.innerHTML += error.stack + '\\n\\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        var box = document.getElementById('debug-error-box');
        box.style.display = 'block';
        box.innerHTML += 'Promise Error: ' + (event.reason ? (event.reason.stack || event.reason.message || event.reason) : event.reason) + '\\n\\n';
      });
    </script>
    <div id="root">
      <style>
        .initial-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #F9FAFB;
          font-family: system-ui, -apple-system, sans-serif;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader {
            background-color: #030712;
          }
        }
        .spinner {
          width: 40px;
          height: 40px;
          border: 4px solid rgba(245, 158, 11, 0.2);
          border-top-color: #F59E0B;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
